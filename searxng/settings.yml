# SearXNG configuration for MediCareAI-Agent
# Docs: https://docs.searxng.org/admin/settings/settings.html

general:
  debug: false
  instance_name: "MediCareAI-SearXNG"
  contact_url: false
  privacypolicy_url: false
  donation_url: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "zh"
  formats:
    - html
    - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "!ultrasecretkey!"
  limiter: false
  image_proxy: false

redis:
  url: redis://valkey:6379/0

ui:
  default_theme: simple
  theme_args:
    simple_style: auto

engines:
  - name: google
    engine: google
    shortcut: g
    categories: [general]
    enabled: true

  - name: bing
    engine: bing
    shortcut: b
    categories: [general]
    enabled: true

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    categories: [general]
    enabled: true

  - name: brave
    engine: brave
    shortcut: br
    categories: [general]
    enabled: true

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    categories: [general]
    enabled: true

  - name: pubmed
    engine: pubmed
    shortcut: pm
    categories: [science]
    enabled: true

  - name: google scholar
    engine: google_scholar
    shortcut: gs
    categories: [science]
    enabled: true

  - name: baidu
    engine: baidu
    shortcut: bd
    categories: [general]
    enabled: true

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  enable_http2: true
  pool_connections: 100
  pool_maxsize: 20
